<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEESONG | Minimal Sudoku</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="game-container">
        <header>
            <h1>SUDOKU</h1>
            <div class="stats">
                <span id="difficulty-label">Easy</span> | <span id="timer">00:00</span>
            </div>
        </header>

        <div id="sudoku-board" class="sudoku-board">
            <!-- 81 cells will be generated by JS -->
        </div>

        <div class="controls">
            <div class="number-pad">
                <button class="num-btn" data-value="1">1</button>
                <button class="num-btn" data-value="2">2</button>
                <button class="num-btn" data-value="3">3</button>
                <button class="num-btn" data-value="4">4</button>
                <button class="num-btn" data-value="5">5</button>
                <button class="num-btn" data-value="6">6</button>
                <button class="num-btn" data-value="7">7</button>
                <button class="num-btn" data-value="8">8</button>
                <button class="num-btn" data-value="9">9</button>
                <button class="num-btn" data-value="erase">⌫</button>
            </div>

            <div class="action-btns">
                <button id="new-game-btn" class="btn btn-primary">New Game</button>
                <button id="hint-btn" class="btn btn-secondary">Hint</button>
                <button id="check-btn" class="btn btn-secondary">Check</button>
            </div>
        </div>
    </div>

    <div id="victory-modal" class="modal">
        <div class="modal-content">
            <h2>Congratulations!</h2>
            <p>You've solved the puzzle in <span id="final-time"></span></p>
            <button id="modal-new-game" class="btn btn-primary">Play Again</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
