<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>국내 여행지 추천 가이드</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- 홈 화면 (여행지 목록) -->
        <section id="home-screen" class="active">
            <div class="header">
                <span class="subtitle">KOREA TRAVEL GUIDE</span>
                <h1>국내 여행지 추천</h1>
            </div>
            <div class="category-filter">
                <button class="filter-btn active" onclick="filterDestinations('all')">전체</button>
                <button class="filter-btn" onclick="filterDestinations('city')">도시</button>
                <button class="filter-btn" onclick="filterDestinations('nature')">자연</button>
                <button class="filter-btn" onclick="filterDestinations('history')">역사</button>
            </div>
            <div class="test-list" id="destination-list">
                <!-- 여행지 카드가 여기에 동적으로 생성됩니다 -->
            </div>
            <button class="btn btn-link" onclick="showContact()">✈️ 여행 문의하기</button>
        </section>

        <!-- 여행지 상세 화면 -->
        <section id="detail-screen">
            <div class="header">
                <span id="detail-category" class="subtitle">카테고리</span>
                <h1 id="detail-title">여행지 이름</h1>
            </div>
            <div class="result-image-container">
                <img id="detail-image" src="" alt="여행지 이미지">
            </div>
            <div class="result-desc">
                <p id="detail-description">여행지 설명이 여기에 들어갑니다.</p>
            </div>
            
            <div class="curation-box">
                <h3>📍 꼭 가봐야 할 명소</h3>
                <ul id="spot-list">
                    <!-- 추천 명소가 여기에 추가됨 -->
                </ul>
            </div>

            <div class="result-btns">
                <button class="btn btn-primary" onclick="goHome()">다른 여행지 보기</button>
                <button class="btn btn-secondary" onclick="shareResult()">여행 정보 공유하기</button>
            </div>
        </section>

        <!-- 제휴 및 문의 화면 -->
        <section id="contact-screen">
            <div class="header">
                <span class="subtitle">CONTACT US</span>
                <h1>여행 문의 및 제안</h1>
            </div>
            <form class="contact-form">
                <div class="form-group">
                    <label for="name">성함</label>
                    <input type="text" id="name" placeholder="성함을 입력해주세요">
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" rows="5" placeholder="궁금하신 점을 자유롭게 적어주세요"></textarea>
                </div>
                <button type="button" class="btn btn-primary" onclick="alert('문의가 접수되었습니다!')">문의 보내기</button>
            </form>
            <button class="btn btn-restart" onclick="hideContact()">돌아가기</button>
        </section>
    </div>

    <script src="main.js"></script>
</body>
</html>
