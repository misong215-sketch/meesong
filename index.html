<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 인간관계 온도 테스트</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Gowun+Batang:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- 시작 화면 -->
        <section id="start-screen" class="active">
            <div class="header">
                <span class="subtitle">나의 사회적 온도는 몇 도일까?</span>
                <h1>나의 인간관계<br>온도 테스트</h1>
            </div>
            <div class="main-image">
                <div class="thermometer-icon">🌡️</div>
            </div>
            <p class="description">
                깊게 고민하지 말고 3초 안에 골라보세요!<br>
                평소 나의 인간관계 스타일을 확인해드립니다.
            </p>
            <button class="btn btn-primary" onclick="startTest()">테스트 시작하기</button>
            <button class="btn btn-link" onclick="showContact()">🤝 제휴 문의하기</button>
        </section>

        <!-- 테스트 진행 화면 -->
        <section id="test-screen">
            <div class="progress-container">
                <div class="progress-bar">
                    <div id="progress" class="progress"></div>
                </div>
                <span id="page-count" class="page-count">1/5</span>
            </div>
            <div class="question-box">
                <h2 id="question-text">질문이 여기에 표시됩니다.</h2>
                <div class="answer-btns">
                    <button id="btnA" class="btn btn-answer" onclick="nextQuestion('A')">A 답변</button>
                    <button id="btnB" class="btn btn-answer" onclick="nextQuestion('B')">B 답변</button>
                </div>
            </div>
        </section>

        <!-- 결과 화면 -->
        <section id="result-screen">
            <span class="subtitle">나의 인간관계 온도는...</span>
            <h1 id="result-title">유형 이름</h1>
            <div id="result-badge" class="result-badge">🔥</div>
            <div class="result-desc">
                <p id="result-summary">성격 특징 요약이 여기에 들어갑니다.</p>
            </div>
            
            <div class="curation-box">
                <h3>💡 당신을 위한 추천 큐레이션</h3>
                <ul id="curation-list">
                    <!-- 큐레이션 아이템이 여기에 추가됨 -->
                </ul>
            </div>

            <div class="result-btns">
                <button class="btn btn-secondary" onclick="shareResult()">결과 공유하기</button>
                <button class="btn btn-restart" onclick="restartTest()">다시 테스트하기</button>
                <button class="btn btn-link" onclick="showContact()">🤝 제휴 문의하기</button>
            </div>
        </section>

        <!-- 제휴 문의 화면 -->
        <section id="contact-screen">
            <div class="header">
                <span class="subtitle">PARTNERSHIP</span>
                <h1>제휴 문의</h1>
            </div>
            <form action="https://formspree.io/f/xqegzbeg" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="name">성함 / 업체명</label>
                    <input type="text" id="name" name="name" placeholder="성함 또는 업체명을 입력해주세요" required>
                </div>
                <div class="form-group">
                    <label for="email">회신 받을 이메일</label>
                    <input type="email" id="email" name="_replyto" placeholder="example@email.com" required>
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" rows="5" placeholder="제휴 제안 또는 문의 내용을 자유롭게 적어주세요" required></textarea>
                </div>
                <!-- Formspree hidden fields -->
                <input type="hidden" name="_subject" value="인간관계 온도 테스트 제휴 문의">
                
                <button type="submit" class="btn btn-primary">문의 보내기</button>
            </form>
            <button class="btn btn-restart" onclick="hideContact()">돌아가기</button>
        </section>
    </div>

    <script src="main.js"></script>
</body>
</html>
